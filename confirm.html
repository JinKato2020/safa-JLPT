<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>メール確認完了 — まいにちJLPT</title>
<style>
  :root{
    --bg:#fff5f7; --card:#ffffff; --ink:#2a2230; --sub:#7a6b78;
    --accent:#e58aa8; --accentInk:#b9527a; --line:#f0d9e2; --ok:#2fa36b;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#1a1520; --card:#241c2b; --ink:#f3e9ef; --sub:#c3a9ba;
           --accent:#e58aa8; --accentInk:#f2a9c4; --line:#3a2d3f; --ok:#5fd39b; }
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(229,138,168,.20), transparent 60%),
      var(--bg);
    color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    padding:24px; min-height:100dvh; line-height:1.7;
  }
  .card{
    width:100%; max-width:420px; background:var(--card);
    border:1px solid var(--line); border-radius:22px;
    padding:34px 26px 30px; text-align:center;
    box-shadow:0 14px 40px rgba(120,60,90,.12);
  }
  .seal{
    width:74px; height:74px; margin:0 auto 18px; border-radius:50%;
    background:linear-gradient(160deg, #ffe3ee, #ffc6dd);
    display:flex; align-items:center; justify-content:center;
    font-size:38px; box-shadow:inset 0 0 0 2px rgba(255,255,255,.6);
  }
  h1{ font-size:22px; margin:0 0 6px; letter-spacing:.02em; }
  .ok{ color:var(--ok); font-weight:800; }
  p{ margin:10px 0; color:var(--sub); font-size:15px; }
  .lead{ color:var(--ink); font-size:16px; font-weight:600; }
  .hr{ height:1px; background:var(--line); margin:22px 0 16px; border:0; }
  .en{ font-size:13px; color:var(--sub); }
  .petal{ color:var(--accentInk); }
</style>
</head>
<body>
  <main class="card">
    <div class="seal">🌸</div>
    <h1><span class="ok">メール確認が完了しました</span></h1>
    <p class="lead">アプリに戻って、メールアドレスとパスワードで<br />ログインしてください。</p>
    <p>この画面は閉じて大丈夫です。学習の記録は、これから安全にクラウドへ保存されます。</p>
    <hr class="hr" />
    <p class="en"><strong>Email confirmed.</strong> Please return to the <span class="petal">まいにちJLPT</span> app and log in with your email and password. You can close this page.</p>
  </main>
</body>
</html>
