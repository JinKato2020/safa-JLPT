name: まいにちJLPT (Androidビルド=App C枠)
run-name: "まいにちJLPT — Android AAB (App C枠 com.safa.english)"

# App C(com.safa.english)の既存Play枠へ「上書き」する Android AAB/APK をビルドする。
# ・applicationId=com.safa.english(app.json)・versionCode=2000+commit(App C現1270より上)。
# ・署名= App C のアップロード鍵(Secrets)。Play App Signing 想定。
# ・Playアップロードは任意自動化: publish=true でAABをPlayの指定トラック(既定 alpha=クローズドテスト)へ提出。
#   過去は手動だったが、SA鍵を入れれば「ビルド→クローズド提出」まで自走可。production指定は外部公開=合図後のみ。
# 必要 Secrets(safa-JLPT): ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD
#   （＝App C のアップロード鍵）＋ publish時のみ GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64（Play サービスアカウントJSONのbase64）。

on:
  workflow_dispatch:
    inputs:
      aab:
        description: 'AABも生成(Playクローズド提出用・約2倍遅い)。実機テストだけならOFF'
        type: boolean
        default: false
      publish:
        description: 'Playへ自動アップロード(AABを下記trackへ提出)。要 GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64'
        type: boolean
        default: false
      track:
        description: 'Playトラック(publish時)。alpha=クローズドテスト / internal=内部 / production=本番(合図後のみ)'
        type: choice
        options: [alpha, internal, production]
        default: alpha

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Cache Gradle (2回目以降を高速化)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-jlpt-android-v1
          restore-keys: gradle-jlpt-android-
      - name: Install npm dependencies
        run: npm ci || npm install
      - name: Calculate versionCode (2000+commit, App C 1270 超)
        run: |
          BUILD_NUMBER=$((2000 + $(git rev-list --count HEAD)))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          APP_VERSION=$(node -p "require('./app.json').expo.version" 2>/dev/null || echo "?")
          echo "## 🤖 ${BUILD_NUMBER} — Android AAB ・ まいにちJLPT v$APP_VERSION (App C枠 com.safa.english)" >> $GITHUB_STEP_SUMMARY
      - name: Expo prebuild (Android)
        env:
          EXPO_NO_TELEMETRY: '1'
        run: npx expo prebuild --platform android --clean
      - name: Set versionCode = build number
        run: sed -i "s/versionCode .*/versionCode $BUILD_NUMBER/" android/app/build.gradle
      - name: Gradleチューニング(JVMメモリ増+ABI限定=90分タイムアウトの真因対策)
        run: |
          GP=android/gradle.properties
          # 真因: 既定 -Xmx2048m/Metaspace512m が不足し lintVital がOOM→GCスラッシング→ハング
          sed -i 's/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx5120m -XX:MaxMetaspaceSize=1280m -XX:+UseParallelGC -Dfile.encoding=UTF-8/' "$GP"
          grep -q '^org.gradle.jvmargs=' "$GP" || echo 'org.gradle.jvmargs=-Xmx5120m -XX:MaxMetaspaceSize=1280m -XX:+UseParallelGC -Dfile.encoding=UTF-8' >> "$GP"
          # ABI=arm64-v8a+armeabi-v7a(実機ARM 64/32bitをカバー・x86/x86_64=エミュ用のみ除外)。
          # ※arm64のみだと旧32bit端末がPlayで非対応になりエラー(5,891台)。両方入れて回避。
          sed -i 's/^reactNativeArchitectures=.*/reactNativeArchitectures=arm64-v8a,armeabi-v7a/' "$GP"
          grep -q '^reactNativeArchitectures=' "$GP" || echo 'reactNativeArchitectures=arm64-v8a,armeabi-v7a' >> "$GP"
          echo "--- tuned ---"; grep -E '^(org.gradle.jvmargs|reactNativeArchitectures)=' "$GP"
      - name: Configure release signing (App C upload key)
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KS_B64" | base64 --decode > android/app/release.keystore
          if [ ! -s android/app/release.keystore ]; then echo "::error::keystore empty (set ANDROID_KEYSTORE_BASE64)"; exit 1; fi
          node -e '
            const fs=require("fs");const p="android/app/build.gradle";let s=fs.readFileSync(p,"utf8");
            if(!s.includes("RELEASE signing (CI)")){
              s=s.replace(/signingConfigs\s*\{/, m=>m+`\n        // RELEASE signing (CI)\n        release {\n            storeFile file("release.keystore")\n            storePassword System.getenv("RELEASE_STORE_PASSWORD")\n            keyAlias System.getenv("RELEASE_KEY_ALIAS")\n            keyPassword System.getenv("RELEASE_KEY_PASSWORD")\n        }`);
              s=s.replace(/signingConfig signingConfigs\.debug/g,"signingConfig signingConfigs.release");
              fs.writeFileSync(p,s);
            }
          '
          grep -q "RELEASE signing (CI)" android/app/build.gradle || { echo "::error::gradle patch failed"; exit 1; }
      - name: Build APK(実機用) ＋ 任意でAAB(Play用)
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          # lintVitalRelease はリリース時Lint(メモリ大食い・OOMハングの一因)→スキップ。配布物に影響なし。
          # publish時はPlay提出にAABが必須なので必ず bundleRelease。
          if [ "${{ inputs.aab }}" = "true" ] || [ "${{ inputs.publish }}" = "true" ]; then
            ./gradlew bundleRelease --no-daemon -x lintVitalRelease
          else
            ./gradlew assembleRelease --no-daemon -x lintVitalRelease
          fi
      - name: Upload AAB (Playクローズドテスト提出用・aab/publish時)
        if: ${{ inputs.aab || inputs.publish }}
        uses: actions/upload-artifact@v4
        with:
          name: jlpt-appc-android-aab-${{ env.BUILD_NUMBER }}
          path: android/app/build/outputs/bundle/release/*.aab
      - name: Upload APK (実機に直接インストール用・aab/publishがfalseのみ)
        if: ${{ !inputs.aab && !inputs.publish }}
        uses: actions/upload-artifact@v4
        with:
          name: jlpt-appc-android-apk-${{ env.BUILD_NUMBER }}
          path: android/app/build/outputs/apk/release/*.apk
      - name: Decode Play service account (publish時)
        if: ${{ inputs.publish }}
        env:
          PLAY_SA_B64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          if [ -z "$PLAY_SA_B64" ]; then
            echo "::error::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 が未設定です。safa-JLPT にこのSecretを追加してください。"; exit 1
          fi
          echo "$PLAY_SA_B64" | base64 --decode > play-sa.json
          test -s play-sa.json || { echo "::error::Play SA JSON のデコードに失敗(値を確認)"; exit 1; }
          echo "## 🚀 Play 提出 — track=${{ inputs.track }} / versionCode=${BUILD_NUMBER} / com.safa.english" >> $GITHUB_STEP_SUMMARY
      - name: Publish AAB to Google Play (track=${{ inputs.track }})
        if: ${{ inputs.publish }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: play-sa.json
          packageName: com.safa.english
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: ${{ inputs.track }}
          status: completed
          releaseName: ${{ env.BUILD_NUMBER }}
      - name: Clean SA file
        if: ${{ always() && inputs.publish }}
        run: rm -f play-sa.json
