name: まいにちJLPT (Androidビルド=App C枠)
run-name: "まいにちJLPT — Android AAB (App C枠 com.safa.english)"

# App C(com.safa.english)の既存Play枠へ「上書き」する Android AAB/APK をビルドする。
# ・applicationId=com.safa.english(app.json)・versionCode=2000+commit(App C現1270より上)。
# ・署名= App C のアップロード鍵(Secrets)。Play App Signing 想定。
# ・Playアップロードは自動化しない（生成AABを手動でApp Cのクローズドテストへ上げる=提出は合図後）。
# 必要 Secrets(safa-JLPT): ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD
#   ＝ C:\API 秘密の鍵\English\ (App C=聞いて話せる英語 のアップロード鍵)。

on:
  workflow_dispatch:
    inputs:
      aab:
        description: 'AABも生成(Playクローズド提出用・約2倍遅い)。実機テストだけならOFF'
        type: boolean
        default: false

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Cache Gradle (2回目以降を高速化)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-jlpt-android-v1
          restore-keys: gradle-jlpt-android-
      - name: Install npm dependencies
        run: npm ci || npm install
      - name: Calculate versionCode (2000+commit, App C 1270 超)
        run: |
          BUILD_NUMBER=$((2000 + $(git rev-list --count HEAD)))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          APP_VERSION=$(node -p "require('./app.json').expo.version" 2>/dev/null || echo "?")
          echo "## 🤖 まいにちJLPT v$APP_VERSION (Android versionCode $BUILD_NUMBER ・ pkg com.safa.english=App C枠)" >> $GITHUB_STEP_SUMMARY
      - name: Expo prebuild (Android)
        env:
          EXPO_NO_TELEMETRY: '1'
        run: npx expo prebuild --platform android --clean
      - name: Set versionCode = build number
        run: sed -i "s/versionCode .*/versionCode $BUILD_NUMBER/" android/app/build.gradle
      - name: Gradleチューニング(JVMメモリ増+ABI限定=90分タイムアウトの真因対策)
        run: |
          GP=android/gradle.properties
          # 真因: 既定 -Xmx2048m/Metaspace512m が不足し lintVital がOOM→GCスラッシング→ハング
          sed -i 's/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx5120m -XX:MaxMetaspaceSize=1280m -XX:+UseParallelGC -Dfile.encoding=UTF-8/' "$GP"
          grep -q '^org.gradle.jvmargs=' "$GP" || echo 'org.gradle.jvmargs=-Xmx5120m -XX:MaxMetaspaceSize=1280m -XX:+UseParallelGC -Dfile.encoding=UTF-8' >> "$GP"
          # ABIをarm64-v8aに限定(x86/x86_64=エミュ用・armeabi-v7a=旧32bitを除外)
          sed -i 's/^reactNativeArchitectures=.*/reactNativeArchitectures=arm64-v8a/' "$GP"
          grep -q '^reactNativeArchitectures=' "$GP" || echo 'reactNativeArchitectures=arm64-v8a' >> "$GP"
          echo "--- tuned ---"; grep -E '^(org.gradle.jvmargs|reactNativeArchitectures)=' "$GP"
      - name: Configure release signing (App C upload key)
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KS_B64" | base64 --decode > android/app/release.keystore
          if [ ! -s android/app/release.keystore ]; then echo "::error::keystore empty (set ANDROID_KEYSTORE_BASE64)"; exit 1; fi
          node -e '
            const fs=require("fs");const p="android/app/build.gradle";let s=fs.readFileSync(p,"utf8");
            if(!s.includes("RELEASE signing (CI)")){
              s=s.replace(/signingConfigs\s*\{/, m=>m+`\n        // RELEASE signing (CI)\n        release {\n            storeFile file("release.keystore")\n            storePassword System.getenv("RELEASE_STORE_PASSWORD")\n            keyAlias System.getenv("RELEASE_KEY_ALIAS")\n            keyPassword System.getenv("RELEASE_KEY_PASSWORD")\n        }`);
              s=s.replace(/signingConfig signingConfigs\.debug/g,"signingConfig signingConfigs.release");
              fs.writeFileSync(p,s);
            }
          '
          grep -q "RELEASE signing (CI)" android/app/build.gradle || { echo "::error::gradle patch failed"; exit 1; }
      - name: Build APK(実機用) ＋ 任意でAAB(Play用)
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          # lintVitalRelease はリリース時Lint(メモリ大食い・OOMハングの一因)→スキップ。配布物に影響なし。
          if [ "${{ inputs.aab }}" = "true" ]; then
            ./gradlew bundleRelease --no-daemon -x lintVitalRelease
          else
            ./gradlew assembleRelease --no-daemon -x lintVitalRelease
          fi
      - name: Upload AAB (Playクローズドテスト提出用・aab=trueのみ)
        if: ${{ inputs.aab }}
        uses: actions/upload-artifact@v4
        with:
          name: jlpt-appc-android-aab-${{ env.BUILD_NUMBER }}
          path: android/app/build/outputs/bundle/release/*.aab
      - name: Upload APK (実機に直接インストール用・aab=falseのみ)
        if: ${{ !inputs.aab }}
        uses: actions/upload-artifact@v4
        with:
          name: jlpt-appc-android-apk-${{ env.BUILD_NUMBER }}
          path: android/app/build/outputs/apk/release/*.apk
