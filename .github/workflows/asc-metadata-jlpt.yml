name: ASC Metadata (Mainichi JLPT)
run-name: "ASC metadata push (submit=${{ github.event.inputs.submit_for_review || 'false' }})"

# =============================================================================
# まいにちJLPT (com.safa.jlpt) — App Store Connect メタデータ＆スクショ投入
# fastlane deliver でリスティング(文言/スクショ)を保存。既定で審査提出はしない。
# 既存 Secrets を流用: APP_STORE_CONNECT_KEY_ID / _ISSUER_ID / _API_KEY_BASE64
# 手動トリガー(workflow_dispatch)のみ。
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      submit_for_review:
        description: 'Submit for review after push? (keep false unless explicitly told)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install fastlane
        run: gem install fastlane --no-document

      - name: Build ASC API key json
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          KID=$(printf '%s' "$KEY_ID" | tr -d '\r\n[:space:]')
          IID=$(printf '%s' "$ISSUER_ID" | tr -d '\r\n[:space:]')
          printf '%s' "$KEY_B64" | base64 --decode > asc_key.p8
          if [ ! -s asc_key.p8 ]; then echo "::error::decoded .p8 empty"; exit 1; fi
          python3 - "$KID" "$IID" <<'PY'
          import json, sys
          kid, iid = sys.argv[1], sys.argv[2]
          key = open('asc_key.p8').read()
          json.dump({"key_id": kid, "issuer_id": iid, "key": key, "duration": 1200, "in_house": False},
                    open('asc_api_key.json', 'w'))
          print("api key json written (key_id=%s)" % kid)
          PY

      - name: fastlane deliver (metadata + screenshots, no binary)
        run: |
          fastlane deliver \
            --api_key_path asc_api_key.json \
            --app_identifier com.safa.jlpt \
            --platform ios \
            --app_version 1.0.0 \
            --metadata_path fastlane/metadata \
            --screenshots_path fastlane/screenshots \
            --skip_binary_upload true \
            --overwrite_screenshots true \
            --force true \
            --run_precheck_before_submit false \
            --submit_for_review ${{ github.event.inputs.submit_for_review }}

      - name: Cleanup secrets
        if: always()
        run: rm -f asc_api_key.json asc_key.p8
